{% extends "base.html" %}

{% block title %}Edit Habit â€” Daily Habit Tracker{% endblock %}

{% block content %}
  <section>
    <p class="eyebrow">Edit Habit</p>
    <h1 class="section-title"><span class="section-icon">✏️</span> Update your habit details.</h1>
    <p class="hero-copy">Change the habit name or description and keep the same streak history and completion logs.</p>
  </section>

  <section class="form-card">
    <form method="post" action="{{ url_for('edit_habit', habit_id=habit.id) }}">
      <label>
        <span class="label">Habit name</span>
        <input type="text" name="name" value="{{ habit.name }}" required>
      </label>
      <label>
        <span class="label">Description</span>
        <textarea name="description" rows="4">{{ habit.description }}</textarea>
      </label>
      <button type="submit">Save Changes</button>
    </form>
  </section>
{% endblock %}
